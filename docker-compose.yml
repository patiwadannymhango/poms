version: '3.9'

services:

  web:
    build:
      context: ./app
    container_name: poms_web

    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000

    volumes:
      - ./app:/code
      - static_volume:/code/staticfiles
      - media_volume:/code/media

    expose:
      - 8000

    env_file:
      - .env

    depends_on:
      - db

  db:
    image: postgres:16
    container_name: poms_postgres

    restart: always

    environment:
      POSTGRES_DB: poms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123

    volumes:
      - postgres_data:/var/lib/postgresql/data/

  nginx:
    image: nginx:latest
    container_name: poms_nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/code/staticfiles
      - media_volume:/code/media

    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: